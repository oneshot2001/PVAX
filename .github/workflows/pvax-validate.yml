name: pvax-validate CLI tests

on:
  push:
    branches: [main]
    paths:
      - 'tools/pvax-validate/**'
      - 'schema/**'
      - '.github/workflows/pvax-validate.yml'
  pull_request:
    paths:
      - 'tools/pvax-validate/**'
      - 'schema/**'
      - '.github/workflows/pvax-validate.yml'
  workflow_dispatch:

jobs:
  test:
    name: fixture acceptance tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/pvax-validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (reproducible)
        run: npm ci

      - name: Strict-mode schema compile gate
        run: npm run compile-schema

      - name: Run unit + CLI tests
        run: npm test

      - name: npm pack smoke (schema is bundled into tarball)
        run: |
          npm pack --pack-destination=/tmp
          tar -tzf /tmp/pvax-validate-*.tgz | grep -q '^package/schema/pvax.schema.json$' \
            || (echo "schema/pvax.schema.json missing from tarball" && exit 1)
