name: pvax-validate CLI tests

on:
  push:
    branches: [main]
    paths:
      - 'tools/pvax-validate/**'
      - 'schema/**'
      - '.github/workflows/pvax-validate.yml'
  pull_request:
    paths:
      - 'tools/pvax-validate/**'
      - 'schema/**'
      - '.github/workflows/pvax-validate.yml'
  workflow_dispatch:

jobs:
  test:
    name: fixture acceptance tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/pvax-validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run fixture tests
        run: npm test
