name: Validate schema + examples

on:
  push:
    branches: [main]
    paths:
      - 'schema/**'
      - 'examples/**'
      - '.github/workflows/validate.yml'
  pull_request:
    paths:
      - 'schema/**'
      - 'examples/**'
      - '.github/workflows/validate.yml'
  workflow_dispatch:

jobs:
  validate:
    name: ajv validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ajv-cli + ajv-formats
        run: npm install --no-save ajv-cli@^5 ajv-formats@^3

      - name: Validate schema is valid JSON Schema 2020-12
        run: |
          npx ajv-cli compile \
            --spec=draft2020 \
            --strict=false \
            -c ajv-formats \
            -s schema/pvax.schema.json

      - name: Validate every example against the schema
        run: |
          shopt -s nullglob
          examples=(examples/*.pvax.json)
          if [ ${#examples[@]} -eq 0 ]; then
            echo "No example .pvax.json files found — skipping data validation."
            exit 0
          fi
          npx ajv-cli validate \
            --spec=draft2020 \
            -c ajv-formats \
            -s schema/pvax.schema.json \
            -d 'examples/*.pvax.json' \
            --strict=false
        shell: bash
